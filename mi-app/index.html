<!DOCTYPE html>
<html>
<head>
<title>Velocidad Promedio</title>
</head>
<body>

<h2>Calcular Velocidad Promedio</h2>

<input type="number" id="distancia" placeholder="Ingrese distancia">
<input type="number" id="tiempo" placeholder="Ingrese tiempo">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<script>
function calcular(){
let distancia = document.getElementById("distancia").value;
let tiempo = document.getElementById("tiempo").value;

let velocidad = distancia / tiempo;

document.getElementById("resultado").innerHTML =
"La velocidad promedio es: " + velocidad;
}
</script>

</body>
</html>
